[tools]
bun = "1.3.9"

# Internal
go = "1.26.1"
"go:github.com/project-init/devex/cmd/sre" = "v0.12.0"

[env]
MISE_DISABLE_BACKENDS = "aqua,ubi"

[settings]
experimental = true
npm.bun = true

# Setup

[tasks.setup]
run = "bun install"

# Build

[tasks.build]
depends = ["setup"]
# run = "bun run build"
run = "echo TODO"

# Tests

[tasks.test]
depends = [
    "unit-test"
]

[tasks.unit-test]
depends = ["setup"]
# run = "bun run test"
run = "echo TODO"

# Linting

[tasks.format]
depends = ["format-*"]

[tasks.format-prettier-sync]
run = "sh ./scripts/sync-prettier-config.sh"

[tasks.format-prettier]
depends = ["setup", "format-prettier-sync"]
run = "bun run format"

[tasks.lint]
depends = ["lint-*"]

[tasks.lint-prettier]
depends = ["setup", "format-prettier-sync"]
run = "bun run lint"

# Dependencies

[tasks.update-dependencies]
run = "bun update"
depends_post = ["setup"]

# Release

[tasks.release]
run = "sre release"